<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #333; }
    p { color: #666; font-size: 0.95rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; text-align: left; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #4f8cff; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #4f8cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #3a7ae8; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #e53e3e; font-size: 0.85rem; margin-top: 8px; }
    .success { color: #38a169; }
    .services { margin-top: 24px; text-align: left; }
    .services h2 { font-size: 0.95rem; color: #555; margin-bottom: 12px; }
    .services a {
      display: block;
      padding: 10px 16px;
      margin-bottom: 8px;
      background: #f7f9fc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #4f8cff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .services a:hover { background: #edf2f7; }
    .loading { color: #999; }
    .redirect-msg { color: #4f8cff; font-size: 0.9rem; margin-top: 16px; }
    #status { margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loadingView">
      <h1>認証処理中...</h1>
      <p class="loading">しばらくお待ちください</p>
    </div>

    <div id="resetView" style="display:none;">
      <h1>新しいパスワードを設定</h1>
      <p>6文字以上の新しいパスワードを入力してください。</p>
      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">新しいパスワード</label>
          <input type="password" id="newPassword" minlength="6" required placeholder="6文字以上">
        </div>
        <div class="form-group">
          <label for="confirmPassword">パスワード確認</label>
          <input type="password" id="confirmPassword" minlength="6" required placeholder="もう一度入力">
        </div>
        <button type="submit" class="btn" id="submitBtn">パスワードを変更する</button>
        <div id="status"></div>
      </form>
    </div>

    <div id="successView" style="display:none;">
      <h1 class="success">パスワードを変更しました</h1>
      <p>新しいパスワードでログインできます。</p>
      <p id="redirectMsg" class="redirect-msg"></p>
      <div class="services">
        <h2>サービス一覧</h2>
        <a href="https://koubo-navi.bantex.jp/">公募ナビAI</a>
        <a href="https://ai-fudosan.bantex.jp/">AI不動産レポート</a>
        <a href="https://ai-shoken.bantex.jp/">AI証券レポート</a>
        <a href="https://ai-shigyo.bantex.jp/">AI士業レポート</a>
      </div>
    </div>

    <div id="errorView" style="display:none;">
      <h1>エラー</h1>
      <p id="errorMsg"></p>
      <div class="services">
        <h2>サービス一覧</h2>
        <a href="https://koubo-navi.bantex.jp/">公募ナビAI</a>
        <a href="https://ai-fudosan.bantex.jp/">AI不動産レポート</a>
        <a href="https://ai-shoken.bantex.jp/">AI証券レポート</a>
        <a href="https://ai-shigyo.bantex.jp/">AI士業レポート</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var SUPABASE_URL = "https://ypyrjsdotkeyvzequdez.supabase.co";
      var SUPABASE_ANON_KEY = "sb_publishable_l5yNWlXOZAHABwlbEalGng_R8zioydf";

      function showView(id) {
        ["loadingView", "resetView", "successView", "errorView"].forEach(function(v) {
          document.getElementById(v).style.display = v === id ? "block" : "none";
        });
      }

      var hashStr = window.location.hash.substring(1);
      var hashParams = new URLSearchParams(hashStr);

      // Check for error in URL (e.g. otp_expired)
      var urlError = hashParams.get("error");
      var errorCode = hashParams.get("error_code");
      if (urlError || errorCode) {
        var msg = errorCode === "otp_expired"
          ? "リンクの有効期限が切れています。もう一度パスワードリセットをお試しください。"
          : "認証エラーが発生しました（" + (errorCode || urlError) + "）。もう一度お試しください。";
        document.getElementById("errorMsg").textContent = msg;
        showView("errorView");
        return;
      }

      var isRecovery = hashParams.get("type") === "recovery";
      if (!isRecovery && !hashParams.get("access_token")) {
        document.getElementById("errorMsg").textContent = "認証情報が無効です。もう一度パスワードリセットをお試しください。";
        showView("errorView");
        return;
      }

      var sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      var recoveryHandled = false;
      var userEmail = null;

      sbClient.auth.onAuthStateChange(function(event, session) {
        if (recoveryHandled) return;
        if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN" || event === "INITIAL_SESSION") {
          if (session && isRecovery) {
            recoveryHandled = true;
            userEmail = session.user.email;
            showView("resetView");
          }
        }
      });

      setTimeout(function() {
        if (recoveryHandled) return;
        sbClient.auth.getSession().then(function(result) {
          if (result.data.session && isRecovery) {
            recoveryHandled = true;
            userEmail = result.data.session.user.email;
            showView("resetView");
          } else {
            document.getElementById("errorMsg").textContent = "認証に失敗しました。もう一度パスワードリセットをお試しください。";
            showView("errorView");
          }
        });
      }, 3000);

      document.getElementById("resetForm").addEventListener("submit", function(e) {
        e.preventDefault();
        var pw = document.getElementById("newPassword").value;
        var confirmPw = document.getElementById("confirmPassword").value;
        var statusEl = document.getElementById("status");
        var btn = document.getElementById("submitBtn");

        if (pw.length < 6) {
          statusEl.innerHTML = '<div class="error">パスワードは6文字以上にしてください。</div>';
          return;
        }
        if (pw !== confirmPw) {
          statusEl.innerHTML = '<div class="error">パスワードが一致しません。</div>';
          return;
        }

        btn.disabled = true;
        btn.textContent = "変更中...";

        sbClient.auth.updateUser({ password: pw }).then(function(result) {
          if (result.error) {
            statusEl.innerHTML = '<div class="error">エラー: ' + result.error.message + '</div>';
            btn.disabled = false;
            btn.textContent = "パスワードを変更する";
            return;
          }

          // DBからリセット元サービスを取得して即リダイレクト
          if (userEmail) {
            fetch(SUPABASE_URL + "/rest/v1/password_reset_origins?email=eq." + encodeURIComponent(userEmail) + "&select=origin_url&limit=1", {
              headers: { "apikey": SUPABASE_ANON_KEY }
            })
            .then(function(r) { return r.json(); })
            .then(function(rows) {
              if (rows.length > 0 && rows[0].origin_url) {
                window.location.href = rows[0].origin_url;
              } else {
                showView("successView");
              }
            })
            .catch(function() { showView("successView"); });
          } else {
            showView("successView");
          }
        });
      });
    })();
  </script>
</body>
</html>
